name: CI

on:
  pull_request:
    branches: [master, prod]

env:
  NODE_VERSION: "20"

jobs:
  test:
    name: Lint, Test, Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build (against staging API)
        env:
          VITE_API_URL: https://api-staging.luminatherapyalliance.com/api/v1
          VITE_ASSESS_URL: https://ops-staging.luminatherapyalliance.com
        run: npm run build
